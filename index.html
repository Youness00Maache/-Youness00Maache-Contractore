  <style>
    :root {
      --card: #ffffff; 
      --ring: #0000bb; 
      --input: #bfbfbf; 
      --muted: #f1f5f9; 
      --accent: #FFCC91; 
      --border: #cbd5e1; 
      --radius: 0.5rem; 
      --shadow: 0 2px 6px -2px rgba(0,0,0,.15); 
      --chart-1: #DCC2F9; 
      --chart-2: #398282; 
      --chart-3: #96C0D6; 
      --chart-4: #FF6B56; 
      --chart-5: #611848; 
      --popover: #ffffff; 
      --primary: #0000bb; 
      --spacing: 0.25rem; 
      --font-mono: monospace; 
      --font-sans: "Aeonik Pro", sans-serif; 
      --secondary: #e2e8f0; 
      --shadow-lg: 0 0 8px rgba(0,0,0,.08); 
      --shadow-md: 0 2px 10px -2px rgba(0,0,0,.2); 
      --shadow-sm: 0 2px 4px -2px rgba(0,0,0,.18); 
      --shadow-xl: 0 0 12px rgba(0,0,0,.1); 
      --background: #f8fafc; 
      --font-serif: serif; 
      --foreground: #0f172a; 
      --shadow-2xl: 0 0 24px rgba(0,0,0,.15); 
      --destructive: #ef4444; 
      --card-foreground: #020617; 
      --muted-foreground: #64748b; 
      --accent-foreground: #0f172a; 
      --popover-foreground: #0f172a; 
      --primary-foreground: #ffffff; 
      --secondary-foreground: #0f172a; 
      --destructive-foreground: #ffffff;
    }
    .dark {
      --card: #1a1a1a; --ring: #0000bb; --input: #525252; --muted: #2b2b2b; --accent: #FFCC91; --border: #404040; --radius: 0.5rem; --shadow: 0 2px 6px -2px rgba(0,0,0,.75); --chart-1: #DCC2F9; --chart-2: #398282; --chart-3: #96C0D6; --chart-4: #FF6B56; --chart-5: #611848; --popover: #1a1a1a; --primary: #0000bb; --font-mono: monospace; --font-sans: "Aeonik Pro", sans-serif; --secondary: #2b2b2b; --shadow-lg: 0 0 8px rgba(0,0,0,.7); --shadow-md: 0 2px 10px -2px rgba(0,0,0,.8); --shadow-sm: 0 2px 4px -2px rgba(0,0,0,.8); --shadow-xl: 0 0 12px rgba(0,0,0,.7); --background: #000000; --font-serif: serif; --foreground: #f5f5f5; --shadow-2xl: 0 0 24px rgba(0,0,0,.75); --destructive: #FF6B56; --card-foreground: #f5f5f5; --muted-foreground: #a3a3a3; --accent-foreground: #f5f5f5; --popover-foreground: #f5f5f5; --primary-foreground: #ffffff; --secondary-foreground: #f5f5f5; --destructive-foreground: #f5f5f5;
    }
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }
    .animate-float {
        animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
    }
    .animate-fade-in {
        animation: fadeInAnimation ease 1s;
        animation-iteration-count: 1;
        animation-fill-mode: forwards;
    }
    @keyframes fadeInAnimation {
        0% { opacity: 0; }
        100% { opacity: 1; }
    }
    .animate-fade-in-down {
        animation: fadeInDownAnimation ease 0.5s;
        animation-iteration-count: 1;
        animation-fill-mode: forwards;
    }
    @keyframes fadeInDownAnimation {
        0% { opacity: 0; transform: translateY(-10px); }
        100% { opacity: 1; transform: translateY(0); }
    }

    /* Scrollbar styles */
    ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
    }
    ::-webkit-scrollbar-track {
        background: var(--muted);
    }
    ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
        background: #555;
    }
  </style>
